name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Build frontend (SPA)
        run: pnpm build:desktop
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_JAAS_APP_ID: ${{ secrets.VITE_JAAS_APP_ID }}

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        id: get_release
        shell: bash
        run: |
          TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename Windows installers
        shell: bash
        run: |
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          [ -n "$NSIS" ] && mv "$NSIS" "src-tauri/target/release/bundle/nsis/SmartDev-ERP-Windows-Setup.exe"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          [ -n "$MSI" ] && mv "$MSI" "src-tauri/target/release/bundle/msi/SmartDev-ERP-Windows.msi"

      - name: Upload to latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_release.outputs.tag }}
          append_body: false
          files: |
            src-tauri/target/release/bundle/nsis/SmartDev-ERP-Windows-Setup.exe
            src-tauri/target/release/bundle/msi/SmartDev-ERP-Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}