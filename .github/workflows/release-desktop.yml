name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Generate route tree
        run: pnpm exec tsr generate

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Build frontend (SPA)
        run: pnpm build:desktop
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_JAAS_APP_ID: ${{ secrets.VITE_JAAS_APP_ID }}

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        id: get_release
        shell: bash
        run: |
          TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename Windows installers
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          [ -n "$NSIS" ] && mv "$NSIS" "src-tauri/target/release/bundle/nsis/SmartDev-ERP-Windows-Setup.exe"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          [ -n "$MSI" ] && mv "$MSI" "src-tauri/target/release/bundle/msi/SmartDev-ERP-Windows.msi"

      - name: Rename Linux installers
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          [ -n "$APPIMAGE" ] && mv "$APPIMAGE" "src-tauri/target/release/bundle/appimage/SmartDev-ERP-Linux.AppImage"
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          [ -n "$DEB" ] && mv "$DEB" "src-tauri/target/release/bundle/deb/SmartDev-ERP-Linux.deb"

      - name: Upload to latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_release.outputs.tag }}
          append_body: false
          files: |
            src-tauri/target/release/bundle/nsis/SmartDev-ERP-Windows-Setup.exe
            src-tauri/target/release/bundle/msi/SmartDev-ERP-Windows.msi
            src-tauri/target/release/bundle/appimage/SmartDev-ERP-Linux.AppImage
            src-tauri/target/release/bundle/deb/SmartDev-ERP-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
