name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Linux only — system deps Tauri needs
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Build frontend
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Windows: rename .exe and .msi ──
      - name: Rename Windows installers
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          [ -n "$NSIS" ] && mv "$NSIS" "src-tauri/target/release/bundle/nsis/SmartDev-ERP-${VERSION}-Windows-Setup.exe"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          [ -n "$MSI" ] && mv "$MSI" "src-tauri/target/release/bundle/msi/SmartDev-ERP-${VERSION}-Windows.msi"

      # ── macOS: rename .dmg ──
      - name: Rename macOS installer
        if: matrix.os == 'macos-latest'
        run: |
          VERSION=${{ github.ref_name }}
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          [ -n "$DMG" ] && mv "$DMG" "src-tauri/target/release/bundle/dmg/SmartDev-ERP-${VERSION}-macOS.dmg"

      # ── Linux: rename .AppImage and .deb ──
      - name: Rename Linux installers
        if: matrix.os == 'ubuntu-22.04'
        run: |
          VERSION=${{ github.ref_name }}
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          [ -n "$APPIMAGE" ] && mv "$APPIMAGE" "src-tauri/target/release/bundle/appimage/SmartDev-ERP-${VERSION}-Linux.AppImage"
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          [ -n "$DEB" ] && mv "$DEB" "src-tauri/target/release/bundle/deb/SmartDev-ERP-${VERSION}-Linux.deb"

      # ── Upload all platform artifacts to the same release ──
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartDev ERP ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## SmartDev ERP ${{ github.ref_name }}

            School management platform for Kenyan and East African schools.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `SmartDev-ERP-${{ github.ref_name }}-Windows-Setup.exe` | Windows (installer) |
            | `SmartDev-ERP-${{ github.ref_name }}-Windows.msi` | Windows (MSI) |
            | `SmartDev-ERP-${{ github.ref_name }}-macOS.dmg` | macOS |
            | `SmartDev-ERP-${{ github.ref_name }}-Linux.AppImage` | Linux (AppImage) |
            | `SmartDev-ERP-${{ github.ref_name }}-Linux.deb` | Linux (Debian/Ubuntu) |
            | `SmartDev-${{ github.ref_name }}.apk` | Android APK |

            ### Install notes
            **Windows:** Run the `.exe`. If SmartScreen appears click "More info" then "Run anyway".
            **macOS:** Open `.dmg`, drag to Applications. If blocked go to System Settings, Privacy, then "Open Anyway".
            **Linux AppImage:** `chmod +x SmartDev-*.AppImage && ./SmartDev-*.AppImage`
            **Android:** Enable "Install from unknown sources" then open the `.apk`.
          files: |
            src-tauri/target/release/bundle/nsis/SmartDev-ERP-${{ github.ref_name }}-Windows-Setup.exe
            src-tauri/target/release/bundle/msi/SmartDev-ERP-${{ github.ref_name }}-Windows.msi
            src-tauri/target/release/bundle/dmg/SmartDev-ERP-${{ github.ref_name }}-macOS.dmg
            src-tauri/target/release/bundle/appimage/SmartDev-ERP-${{ github.ref_name }}-Linux.AppImage
            src-tauri/target/release/bundle/deb/SmartDev-ERP-${{ github.ref_name }}-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
