name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and attach assets to (e.g. v1.0.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.os }}

    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Linux only — system deps Tauri needs
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev
      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Build frontend
        run: pnpm build:desktop
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_JAAS_APP_ID: ${{ secrets.VITE_JAAS_APP_ID }}

      # Windows & Linux only — no signing secrets needed, no macOS in the matrix
      - name: Build Tauri app (Windows / Linux)
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # ── Windows: rename .exe and .msi ──
      - name: Rename Windows installers
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          [ -n "$NSIS" ] && mv "$NSIS" "src-tauri/target/release/bundle/nsis/SmartDev-ERP-${VERSION}-Windows-Setup.exe"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          [ -n "$MSI" ] && mv "$MSI" "src-tauri/target/release/bundle/msi/SmartDev-ERP-${VERSION}-Windows.msi"
      # ── Linux: rename .AppImage and .deb ──
      - name: Rename Linux installers
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          [ -n "$APPIMAGE" ] && mv "$APPIMAGE" "src-tauri/target/release/bundle/appimage/SmartDev-ERP-${VERSION}-Linux.AppImage"
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          [ -n "$DEB" ] && mv "$DEB" "src-tauri/target/release/bundle/deb/SmartDev-ERP-${VERSION}-Linux.deb"
      # ── Upload artifacts onto the existing release for this tag ──
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: SmartDev ERP ${{ env.VERSION }}
          draft: false
          prerelease: false
          append_body: true
          body: |
            ### Desktop downloads
            | File | Platform |
            |------|----------|
            | `SmartDev-ERP-${{ env.VERSION }}-Windows-Setup.exe` | Windows (installer) |
            | `SmartDev-ERP-${{ env.VERSION }}-Windows.msi` | Windows (MSI) |
            | `SmartDev-ERP-${{ env.VERSION }}-Linux.AppImage` | Linux (AppImage) |
            | `SmartDev-ERP-${{ env.VERSION }}-Linux.deb` | Linux (Debian/Ubuntu) |
            ### Install notes
            **Windows:** Run the `.exe`. If SmartScreen appears click "More info" then "Run anyway".
            **Linux AppImage:** `chmod +x SmartDev-*.AppImage && ./SmartDev-*.AppImage`
          files: |
            src-tauri/target/release/bundle/nsis/SmartDev-ERP-${{ env.VERSION }}-Windows-Setup.exe
            src-tauri/target/release/bundle/msi/SmartDev-ERP-${{ env.VERSION }}-Windows.msi
            src-tauri/target/release/bundle/appimage/SmartDev-ERP-${{ env.VERSION }}-Linux.AppImage
            src-tauri/target/release/bundle/deb/SmartDev-ERP-${{ env.VERSION }}-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
