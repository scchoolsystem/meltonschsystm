name: Build & Release SmartDev ERP Desktop Apps

on:
  push:
    branches: [main, desktop-app-development]
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            bundle: msi
          - os: macos-latest
            name: macos
            bundle: dmg
          - os: ubuntu-22.04
            name: linux
            bundle: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Node.js setup
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # -------------------------
      # PNPM setup
      # -------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # -------------------------
      # Rust setup (Tauri requirement)
      # -------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        run: pnpm install

      # -------------------------
      # Build frontend (Vite / React / etc.)
      # -------------------------
      - name: Build frontend
        run: pnpm build:desktop
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      # -------------------------
      # Build Tauri app
      # -------------------------
      - name: Build Tauri App
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # -------------------------
      # Upload artifacts (always saved)
      # -------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartDev-ERP-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*

      # -------------------------
      # Attach files to GitHub Release (only when tagging)
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
